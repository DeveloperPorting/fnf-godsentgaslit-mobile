name: Main Build

on: 
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------
  # 1. ANDROID BUILD
  # -----------------------------------------------------------------
  android:
    name: Build Android
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2.0.2
        with:
          haxe-version: 4.3.7

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib git hxcpp https://github.com/FunkinCrew/hxcpp 5932340d095a7eea8635fe4d1355f1c0efd0b3c2 --quiet
          chmod +x ./setup/android.sh
          sh ./setup/android.sh
          haxelib run lime rebuild hxcpp --quiet

      - name: Configure Android
        run: |
          haxelib run lime setup android
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_X64
          haxelib run lime config ANDROID_SETUP true

      - name: Compile
        run: haxelib run lime build android -release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GodsentGaslit-Android
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  # -----------------------------------------------------------------
  # 2. iOS BUILD
  # -----------------------------------------------------------------
  ios:
    name: Build iOS
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2.0.2
        with:
          haxe-version: 4.3.7
          
      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib git hxcpp https://github.com/FunkinCrew/hxcpp 5932340d095a7eea8635fe4d1355f1c0efd0b3c2 --quiet
          chmod +x ./setup/ios.sh
          sh ./setup/ios.sh
          haxelib run lime rebuild hxcpp --quiet

      - name: Compile
        run: haxelib run lime build ios -nosign

      - name: Making ipa file
        run: |
          brew install ldid
          cd export/release/ios/build/Release-iphoneos/GodsentGaslit.app
          ldid -S../../../GodsentGaslit/GodsentGaslit.entitlements GodsentGaslit
          cd ..
          mkdir Payload
          mv GodsentGaslit.app Payload
          zip -r GodsentGaslit.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GodsentGaslit-iOS
          path: export/release/ios/build/Release-iphoneos/*.ipa
          if-no-files-found: error